name: Validate Prompt PR

on:
  pull_request:
    paths:
      - "prompts/**/*.md"

jobs:
  validate:
    name: Validate Prompt Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get changed prompt files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: "prompts/**/*.md"

      - name: Validate changed prompt files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          FAILED=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Validating: $file"
            node scripts/validate.js "$file"
            if [ $? -ne 0 ]; then
              FAILED=1
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "One or more prompt files failed validation."
            exit 1
          fi

      - name: Skip (no prompt files changed)
        if: steps.changed-files.outputs.any_changed == 'false'
        run: echo "No prompt files changed. Skipping."
